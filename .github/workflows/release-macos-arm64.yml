name: release-macos-arm64

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    environment: release
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Import Apple signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_SIGNING_CERT_BASE64 }}
          p12-password: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}

      - name: Decode notarization API key
        env:
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          key_id = os.environ["APPLE_API_KEY_ID"]
          output_path = Path(os.environ["RUNNER_TEMP"]) / f"AuthKey_{key_id}.p8"
          output_path.write_bytes(base64.b64decode(os.environ["APPLE_API_PRIVATE_KEY_BASE64"]))
          output_path.chmod(0o600)

          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as handle:
              handle.write(f"APPLE_API_PRIVATE_KEY_PATH={output_path}\n")
          PY

      - name: Build app bundle
        run: packaging/macos/build_app.sh
        env:
          UV_PYTHON_PREFERENCE: only-system

      - name: Sign, notarize, and staple macOS artifacts
        run: packaging/macos/sign_and_notarize.sh
        env:
          NOTARY_POLL_INTERVAL_SECONDS: "30"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenPlot-arm64
          path: dist/OpenPlot-arm64.dmg

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OpenPlot-arm64.dmg

      - name: Clean up notarization key
        if: always()
        run: |
          if [[ -n "${APPLE_API_PRIVATE_KEY_PATH:-}" ]]; then
            rm -f "$APPLE_API_PRIVATE_KEY_PATH"
          fi
