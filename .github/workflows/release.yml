name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - exact
      exact_version:
        description: Exact semantic version when release_type=exact
        required: false
        type: string
      validate_only:
        description: Run the release rehearsal without creating a commit or tag
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-22.04
    env:
      RELEASE_TYPE: ${{ inputs.release_type }}
      EXACT_VERSION: ${{ inputs.exact_version }}

    steps:
      - name: Require main workflow ref
        env:
          GITHUB_REF_VALUE: ${{ github.ref }}
        run: |
          if [[ "$GITHUB_REF_VALUE" != "refs/heads/main" ]]; then
            echo "Release runs must start from refs/heads/main, got $GITHUB_REF_VALUE" >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure authenticated origin remote
        env:
          RELEASE_WORKFLOW_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
          GITHUB_TOKEN_VALUE: ${{ github.token }}
        run: |
          token="$RELEASE_WORKFLOW_TOKEN"
          if [[ -z "$token" ]]; then
            token="$GITHUB_TOKEN_VALUE"
          fi
          if [[ -z "$token" ]]; then
            echo "No token available for authenticated origin remote" >&2
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${token}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Verify checkout matches latest origin/main
        id: verify_main
        run: |
          git fetch --no-tags origin main
          head_sha="$(git rev-parse HEAD)"
          remote_main_sha="$(git rev-parse origin/main)"
          if [[ "$head_sha" != "$remote_main_sha" ]]; then
            echo "Release must start from the latest origin/main." >&2
            echo "HEAD=$head_sha" >&2
            echo "origin/main=$remote_main_sha" >&2
            exit 1
          fi
          echo "base_main_sha=$remote_main_sha" >> "$GITHUB_OUTPUT"

      - name: Rehearse requested release versioning locally
        run: |
          cmd=(uv run python -m openplot.release_versioning --release-type "$RELEASE_TYPE" --dry-run)
          if [[ "$RELEASE_TYPE" == "exact" ]]; then
            if [[ -z "$EXACT_VERSION" ]]; then
              echo "exact_version is required when release_type=exact" >&2
              exit 1
            fi
            cmd+=(--exact-version "$EXACT_VERSION")
          fi
          "${cmd[@]}"

      - name: Sync release versions
        id: sync_versions
        run: |
          cmd=(uv run python -m openplot.release_versioning --release-type "$RELEASE_TYPE" --github-output "$GITHUB_OUTPUT")
          if [[ "$RELEASE_TYPE" == "exact" ]]; then
            if [[ -z "$EXACT_VERSION" ]]; then
              echo "exact_version is required when release_type=exact" >&2
              exit 1
            fi
            cmd+=(--exact-version "$EXACT_VERSION")
          fi
          "${cmd[@]}"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false

      - name: Sync nix npmDepsHash
        run: uv run python -m openplot.nix_hash_sync

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Run pytest
        run: uv run pytest

      - name: Build Python distributions
        run: uv build

      - name: Verify wheel contains frontend assets
        run: |
          python packaging/python/verify_python_dist.py \
            --source-static-dir src/openplot/static \
            --dist-dir dist

      - name: Check version consistency
        run: uv run python -m openplot.release_versioning --check

      - name: Build Nix package
        run: nix build .#openplot --no-link

      - name: Guard tracked working tree changes
        run: |
          python - <<'PY'
          import subprocess
          import sys

          allowed = {
              "flake.nix",
              "frontend/package-lock.json",
              "frontend/package.json",
              "pyproject.toml",
              "src/openplot/__init__.py",
              "uv.lock",
          }
          result = subprocess.run(
              ["git", "status", "--porcelain", "--untracked-files=no"],
              capture_output=True,
              text=True,
              check=True,
          )
          bad = []
          for line in result.stdout.splitlines():
              path = line[3:]
              if path not in allowed:
                  bad.append(line)
          if bad:
              print("Unexpected tracked changes after release validation:", file=sys.stderr)
              for line in bad:
                  print(line, file=sys.stderr)
              raise SystemExit(1)
          PY

      - name: Re-check origin/main before creating release
        env:
          BASE_MAIN_SHA: ${{ steps.verify_main.outputs.base_main_sha }}
        run: |
          git fetch --no-tags origin main
          remote_main_sha="$(git rev-parse origin/main)"
          if [[ "$remote_main_sha" != "$BASE_MAIN_SHA" ]]; then
            echo "origin/main moved during the release run." >&2
            echo "start=$BASE_MAIN_SHA" >&2
            echo "current=$remote_main_sha" >&2
            exit 1
          fi

      - name: Require release push token
        if: ${{ !inputs.validate_only }}
        env:
          RELEASE_WORKFLOW_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          if [[ -z "$RELEASE_WORKFLOW_TOKEN" ]]; then
            echo "Missing required secret RELEASE_WORKFLOW_TOKEN" >&2
            exit 1
          fi

      - name: Create and push release commit
        if: ${{ !inputs.validate_only }}
        env:
          TARGET_VERSION: ${{ steps.sync_versions.outputs.target_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml frontend/package.json frontend/package-lock.json uv.lock flake.nix src/openplot/__init__.py
          git commit -m "chore: release v$TARGET_VERSION"
          git tag "v$TARGET_VERSION"
          git push --atomic origin HEAD:main "v$TARGET_VERSION"

      - name: Report validate-only completion
        if: ${{ inputs.validate_only }}
        env:
          TARGET_VERSION: ${{ steps.sync_versions.outputs.target_version }}
        run: |
          echo "Validated release workflow for v$TARGET_VERSION without creating a commit or tag."
